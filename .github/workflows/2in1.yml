name: 2in1 Build
on:
  workflow_dispatch:
    inputs:
      model_ds918p:
        description: "DS918+"
        type: boolean
        default: true
      model_ds920p:
        description: "DS920+"
        type: boolean
        default: true
      model_ds923p:
        description: "DS923+"
        type: boolean
        default: true
      model_ds925p:
        description: "DS925+"
        type: boolean
        default: true
      model_ds3622xsp:
        description: "DS3622xs+"
        type: boolean
        default: true
      model_sa6400:
        description: "SA6400"
        type: boolean
        default: true
      model_ds425p:
        description: "DS425+"
        type: boolean
        default: true
      model_dva3221:
        description: "DVA3221"
        type: boolean
        default: true
      model_dva1622:
        description: "DVA1622"
        type: boolean
        default: true
      build_update_zip:
        description: "编译升级包（update_xxx.zip）"
        type: boolean
        default: true
      rr_version:
        description: "RR version (可选，留空=latest；示例：26.4.0 或 v26.4.0)"
        type: string
        default: ""
      dsm_version:
        description: "DSM 版本编号（用于匹配 pats.xlsx）"
        type: choice
        options:
          - "7.2.1"
          - "7.2.2"
          - "7.3.2"
        default: "7.3.2"

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.pick.outputs.tag }}
      asset_url: ${{ steps.pick.outputs.asset_url }}
    steps:
      - id: pick
        shell: bash
        run: |
          set -euo pipefail
          req_raw="${{ inputs.rr_version }}"
          req_tag="$(printf '%s' "$req_raw" | tr -d '[:space:]')"
          req_tag="${req_tag#rr-}"
          req_tag="${req_tag%.img.zip}"
          req_tag="${req_tag#v}"

          fetch_latest() {
            curl -fsSL --connect-timeout 10 "https://api.github.com/repos/RROrg/rr/releases/latest"
          }
          fetch_tag() {
            local t="$1"
            curl -fsSL --connect-timeout 10 "https://api.github.com/repos/RROrg/rr/releases/tags/${t}"
          }

          if [ -z "$req_tag" ] || [ "$req_tag" = "latest" ]; then
            json="$(fetch_latest)"
          else
            if ! json="$(fetch_tag "$req_tag" 2>/dev/null)"; then
              echo "[WARN] rr_version=${req_raw} not found by tag, fallback to latest"
              json="$(fetch_latest)"
            fi
          fi

          tag="$(printf '%s' "$json" | jq -r '.tag_name' | sed 's/^v//')"
          asset_url="$(printf '%s' "$json" | jq -r '.assets[]? | select(.name | test("^rr-.*\\.img\\.zip$")) | .browser_download_url' | head -n1)"
          if [ -z "$tag" ] || [ "$tag" = "null" ] || [ -z "$asset_url" ] || [ "$asset_url" = "null" ]; then
            echo "Download failed (rr_version=${req_raw:-latest})"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "asset_url=$asset_url" >> "$GITHUB_OUTPUT"

  select-models:
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.pick.outputs.models }}
    steps:
      - id: pick
        shell: bash
        run: |
          set -euo pipefail
          models=()
          [ "${{ inputs.model_ds918p }}" = "true" ] && models+=("DS918+")
          [ "${{ inputs.model_ds920p }}" = "true" ] && models+=("DS920+")
          [ "${{ inputs.model_ds923p }}" = "true" ] && models+=("DS923+")
          [ "${{ inputs.model_ds925p }}" = "true" ] && models+=("DS925+")
          [ "${{ inputs.model_ds3622xsp }}" = "true" ] && models+=("DS3622xs+")
          [ "${{ inputs.model_sa6400 }}" = "true" ] && models+=("SA6400")
          [ "${{ inputs.model_ds425p }}" = "true" ] && models+=("DS425+")
          [ "${{ inputs.model_dva3221 }}" = "true" ] && models+=("DVA3221")
          [ "${{ inputs.model_dva1622 }}" = "true" ] && models+=("DVA1622")

          # 去重
          uniq_models=()
          for m in "${models[@]}"; do
            skip=0
            for u in "${uniq_models[@]}"; do
              [ "$u" = "$m" ] && { skip=1; break; }
            done
            [ $skip -eq 0 ] && uniq_models+=("$m")
          done
          models=("${uniq_models[@]}")

          if [ "${{ inputs.build_update_zip }}" = "true" ]; then
            models+=("__UPDATE_DT__")
            models+=("__UPDATE_NODT__")
          fi

          if [ ${#models[@]} -eq 0 ]; then
            echo "请至少勾选一个型号，或勾选 update 包编译"
            exit 1
          fi

          json="["
          for m in "${models[@]}"; do
            json+="\"$m\"," 
          done
          json="${json%,}]"
          echo "models=$json" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.model == '__UPDATE_DT__' && 'build (update-dt)' || (matrix.model == '__UPDATE_NODT__' && 'build (update-nodt)' || format('build ({0})', matrix.model)) }}
    needs: [resolve-release, select-models]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        model: ${{ fromJson(needs.select-models.outputs.models) }}
    env:
      FORMAT: vmdk
      LANGUAGE: zh_CN
      DSM_VERSION: ${{ inputs.dsm_version }}
      KERNEL: official
      ADDONS: acpid,reboottoloader,addincards,cpuinfo,expands,diskcompat,lsiutil,nvmevolume,powersched,remotefs,storagepanel,smartctl,trivial,apppatch,vmtools,resizepart
      ACTION_TOKEN: ${{ secrets.ACTION_TOKEN }}
      RR_ASSET_URL: ${{ needs.resolve-release.outputs.asset_url }}
      RR_TAG: ${{ needs.resolve-release.outputs.tag }}
      BUILD_UPDATE_ZIP: ${{ inputs.build_update_zip }}
      DSM_LINE: ${{ inputs.dsm_version }}
    steps:
      - uses: actions/checkout@main

      - name: Init Env
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Fetch RR Release Asset
        shell: bash
        run: |
          set -euo pipefail
          : "${RR_TAG:?missing RR_TAG}"
          : "${RR_ASSET_URL:?missing RR_ASSET_URL}"
          filename="rr-${RR_TAG}.zip"
          curl -fsSL --connect-timeout 10 "$RR_ASSET_URL" -o "$filename"
          echo "TAG=$RR_TAG" >> "$GITHUB_ENV"
          echo "FILENAME=$filename" >> "$GITHUB_ENV"

      - name: Build Image
        shell: bash
        env:
          MODEL: ${{ matrix.model }}
        run: |
          set -euo pipefail
          UPDATE_ONLY="false"
          UPDATE_FLAVOR=""
          if [ "${MODEL}" = "__UPDATE_DT__" ]; then
            UPDATE_ONLY="true"
            UPDATE_FLAVOR="dt"
            MODEL="SA6400"
          elif [ "${MODEL}" = "__UPDATE_NODT__" ]; then
            UPDATE_ONLY="true"
            UPDATE_FLAVOR="nodt"
            MODEL="DS918+"
          fi

          pick_target_dsm_version() {
            local line="$1"
            case "$line" in
              7.2.1)
                printf '7.2.1-69057-1'
                ;;
              7.2.2)
                printf '7.2.2-72806-0'
                ;;
              7.3.2)
                printf '7.3.2-86009-0'
                ;;
              *)
                printf '[E] unsupported DSM line: %s' "$line"
                return 1
                ;;
            esac
          }
          DSM_LINE_REQ="${DSM_LINE:-7.3.2}"
          export DSM_LINE_REQ
          if echo "${MODEL}" | grep -Eq '^(DS925\+|DS425\+)$' && [ "${DSM_LINE_REQ}" = "7.2.1" ]; then
            echo "[INFO] ${MODEL} 不支持 7.2.1，自动切到 7.2.2"
            DSM_LINE_REQ="7.2.2"
          fi
          TARGET_DSM_VERSION="$(pick_target_dsm_version "${DSM_LINE_REQ}")"
          DSM_LINE_SHORT="${DSM_LINE_REQ%.*}"
          export DSM_LINE_SHORT
          ver_main="${TARGET_DSM_VERSION%%-*}"
          ver_main_nodot="${ver_main//./}"
          ver_build="${TARGET_DSM_VERSION#*-}"
          ver_build="${ver_build%%-*}"
          artifact_version="${ver_main_nodot}_${ver_build}"
          SAFE_TAG="${TAG//./_}"
          echo "SAFE_TAG=${SAFE_TAG}" >> "$GITHUB_ENV"
          artifact="${MODEL}_${artifact_version}_15g_Ainas2in1_${SAFE_TAG}"
          echo "[DEBUG] model=${MODEL} target_dsm_version=${TARGET_DSM_VERSION} dsm_line_req=${DSM_LINE_REQ} artifact_version=${artifact_version}"
          echo "[DEBUG] env DSM_LINE_REQ=${DSM_LINE_REQ}"

          sudo apt-get update
          sudo apt-get install -y gettext cpio zstd dosfstools rsync qemu-utils
          unzip "$FILENAME" -d rr rr.img
          cp -f rr/rr.img rr/rr.base.img

          WORKDIR="$PWD"
          AINAS2IN1_DIR="${WORKDIR}/.2in1"
          rm -rf "$AINAS2IN1_DIR"
          mkdir -p "$AINAS2IN1_DIR"
          git clone --depth 1 "https://x-access-token:${ACTION_TOKEN}@github.com/myp015/ainas2in1.git" "$AINAS2IN1_DIR"

          grub_mnt="/mnt/p1"
          sudo mkdir -p /mnt/p1 /mnt/p2 /mnt/p3
          grub_loop=$(sudo losetup -f)
          sudo losetup -P "$grub_loop" rr/rr.img
          
          sudo e2label "${grub_loop}p2" RDGZ
          sudo e2label "${grub_loop}p3" RAMDISK
          sudo fatlabel "${grub_loop}p1" AiNasloader

          sudo mount -o rw "${grub_loop}p1" "$grub_mnt"
          echo "[DEBUG] grub.cfg patch start"
          sudo cp -f "$grub_mnt/boot/grub/grub.cfg" /tmp/grub.cfg
          sudo bash -c 'cd /tmp && bash "$1" "$2" "$3"' _ "$AINAS2IN1_DIR/script/2in1_grubcfg_patch.sh" "$MODEL" "$DSM_LINE_SHORT"
          sudo cp -f /tmp/grub.cfg "$grub_mnt/boot/grub/grub.cfg"
          echo "[DEBUG] grub.cfg patch succeeded"
          sudo umount "$grub_mnt" || true
          sudo losetup --detach "$grub_loop" || true

          loopx=$(sudo losetup -f)
          sudo losetup -P "$loopx" rr/rr.img

          sudo rm -rf /mnt/p3
          sudo mkdir -p /mnt/p3
          sudo mount "${loopx}p3" /mnt/p3
          if [ -f /mnt/p3/bzImage-rr ]; then
            sudo mv -f /mnt/p3/bzImage-rr /mnt/p3/bzImage-ainas
            echo "[DEBUG] renamed bzImage-rr -> bzImage-ainas"
          else
            echo "[WARN] bzImage-rr not found on p3"
          fi

          sudo mkdir -p /mnt/p3/addons
          sudo cp -a "$AINAS2IN1_DIR/addons/nvmevolume" /mnt/p3/addons/ || true
          sudo cp -a "$AINAS2IN1_DIR/addons/resizepart" /mnt/p3/addons/ || true
          sudo rm -rf /mnt/p3/addons/updatenotify /mnt/p3/addons/mountloader || true
          
          DISK_TGZ="/mnt/p3/addons/disks/all.tgz"
          DISK_WORK="/tmp/disks_patch"
          if echo "${MODEL}" | grep -Eq '^(DS918\+|DS3622xs\+|DVA3221)$'; then
            echo "[DEBUG] disks replace start (non-DT model)"
            if [ -f "$DISK_TGZ" ]; then
              rm -rf "$DISK_WORK"
              mkdir -p "$DISK_WORK/extract" "$DISK_WORK/rootfs"
              sudo tar -zxf "$DISK_TGZ" -C "$DISK_WORK/extract"
              if [ -f "$DISK_WORK/extract/root/usr/bin/disks.sh" ]; then
                sudo rm -rf /mnt/p3/addons/disks
                sudo mkdir -p /mnt/p3/addons
                sudo cp -a "$AINAS2IN1_DIR/addons/disks" /mnt/p3/addons/
                echo "[DEBUG] disks addon replaced from ainas2in1 repo"
              else
                echo "[WARN] disks replace skipped: disks.sh not found"
              fi
            else
              echo "[WARN] disks replace skipped: $DISK_TGZ not found"
            fi
          else
            echo "[DEBUG] disks patch start (DT model)"
            if [ -f "$DISK_TGZ" ]; then
              rm -rf "$DISK_WORK"
              mkdir -p "$DISK_WORK/extract"
              sudo tar -zxf "$DISK_TGZ" -C "$DISK_WORK/extract"
              if [ -f "$DISK_WORK/extract/root/usr/bin/disks.sh" ]; then
                (cd "$DISK_WORK/extract/root/usr/bin" && bash "$AINAS2IN1_DIR/script/2in1_disk_patch.sh")
                if ! (cd "$DISK_WORK/extract/root/usr/bin" && grep -q 'RAMDISK' disks.sh); then
                  echo "[E] disks patch verification failed: RAMDISK not found"
                  exit 1
                fi
                (cd "$DISK_WORK/extract/root/usr/bin" && grep -n 'disks.sh' disks.sh | sed -n '1,5p' || true)
                (cd "$DISK_WORK/extract" && sudo tar -czf "$DISK_TGZ" .)
                echo "[DEBUG] disks patch succeeded"
              else
                echo "[WARN] disks patch skipped: disks.sh not found"
              fi
            else
              echo "[WARN] disks patch skipped: $DISK_TGZ not found"
            fi
          fi


          echo "[DEBUG] cpuinfo patch start"

          CPUINFO_TGZ="/mnt/p3/addons/cpuinfo/all.tgz"
          CPUINFO_WORK="/tmp/cpuinfo_patch"
          if [ -f "$CPUINFO_TGZ" ]; then
            rm -rf "$CPUINFO_WORK"
            mkdir -p "$CPUINFO_WORK/extract" "$CPUINFO_WORK/rootfs"

            sudo tar -zxf "$CPUINFO_TGZ" -C "$CPUINFO_WORK/extract"

            PATCH_TARGET=""
            REPACK_MODE=""

            if [ -f "$CPUINFO_WORK/extract/all.tar" ]; then
              REPACK_MODE="inner-tar"
              sudo tar -xf "$CPUINFO_WORK/extract/all.tar" -C "$CPUINFO_WORK/rootfs"
              if [ -f "$CPUINFO_WORK/rootfs/root/usr/bin/cpuinfo.sh" ]; then
                PATCH_TARGET="$CPUINFO_WORK/rootfs/root/usr/bin/cpuinfo.sh"
              fi
            elif [ -f "$CPUINFO_WORK/extract/root/usr/bin/cpuinfo.sh" ]; then
              REPACK_MODE="direct"
              PATCH_TARGET="$CPUINFO_WORK/extract/root/usr/bin/cpuinfo.sh"
            fi

            if [ -n "$PATCH_TARGET" ]; then
              python3 "$AINAS2IN1_DIR/script/2in1_patch-cpuinfo.py" "$PATCH_TARGET"
              if ! grep -q "Requires=dev-synoboot2.device\|#Requires=dev-synoboot2.device" "$PATCH_TARGET"; then
                echo "[E] cpuinfo patch verify failed: syno-flash sed line not found in $PATCH_TARGET"
                exit 1
              fi
              echo "[DEBUG] cpuinfo patch verify success: syno-flash sed line found"
              if [ "$REPACK_MODE" = "inner-tar" ]; then
                (cd "$CPUINFO_WORK/rootfs" && sudo tar -cf "$CPUINFO_WORK/extract/all.tar" .)
                (cd "$CPUINFO_WORK/extract" && sudo tar -czf "$CPUINFO_TGZ" .)
              else
                (cd "$CPUINFO_WORK/extract" && sudo tar -czf "$CPUINFO_TGZ" .)
              fi
              echo "[DEBUG] cpuinfo all.tgz repacked successfully (mode=$REPACK_MODE)"
            else
              echo "[WARN] cpuinfo patch skipped: cpuinfo.sh not found in known all.tgz layouts"
            fi
          else
            echo "[WARN] cpuinfo patch skipped: $CPUINFO_TGZ not found"
          fi

          sudo mkdir -p /tmp/initrd_work
          cd /tmp/initrd_work
          
          
          sudo zstd -dc /mnt/p3/initrd-rr | sudo cpio -idm

          if [ "$(printf '%s\n' "$TAG" "25.9.7" | sort -V | head -n1)" = "$TAG" ] && [ "$TAG" != "25.9.7" ]; then
            sudo bash "$AINAS2IN1_DIR/script/2in1_ram_patch-25_3_3.sh"
            sudo cp -f "$AINAS2IN1_DIR/script/.bashrc" "/tmp/initrd_work/root/.bashrc"
          else
            sudo bash "$AINAS2IN1_DIR/script/2in1_ram_patch-26_3_3.sh"
          fi


          echo "[DEBUG] initrd-rr repack start"
          sudo find . | sudo cpio -o -H newc -R root:root | sudo zstd -19 -T0 -f -c - | sudo tee /mnt/p3/initrd-ainas >/dev/null
          sudo rm -f /mnt/p3/initrd-rr

          cd "$WORKDIR"
          
          sudo umount /mnt/p3 || true
          sudo rm -rf /mnt/p3

          if [ "${UPDATE_ONLY}" != "true" ]; then
          cat > build.sh <<EOF
          set -eo pipefail
          . menu.sh
          TARGET_DSM_VERSION="${TARGET_DSM_VERSION}"
          echo "[DEBUG] model=${MODEL} target_dsm_version=\${TARGET_DSM_VERSION} artifact_version=\${artifact_version}"
          menu.sh modelMenu "${MODEL}"
          menu.sh productversMenu "\${TARGET_DSM_VERSION}"
          LOCALE_FILE="\$(dirname "\${USER_CONFIG_FILE}")/.locale"
          echo "${LANGUAGE}.UTF-8" >"\${LOCALE_FILE}"
          echo "[DEBUG] locale file: \$(cat "\${LOCALE_FILE}" 2>/dev/null || echo MISSING)"

          writeConfigKey "addons" "{}" "\${USER_CONFIG_FILE}"
          FORCE_NVME_CACHE=0
          ADDONS_SEED="${ADDONS}"
          echo "[DEBUG] ADDONS seed=\${ADDONS_SEED}"
          IFS=',' read -ra ADDON_ARR <<< "\${ADDONS_SEED}"
          declare -A __SEEN_ADDON=()
          for A in "\${ADDON_ARR[@]}"; do
            if echo "\${A}" | grep -q ':'; then
              KEY="\$(echo "\${A}" | cut -d':' -f1 | xargs)"
              VAL="\$(echo "\${A}" | cut -d':' -f2- | xargs)"
            else
              KEY="\$(echo "\${A}" | xargs)"
              VAL=""
            fi
            [ -z "\${KEY}" ] && continue
            [ -n "\${__SEEN_ADDON[\${KEY}]}" ] && continue
            __SEEN_ADDON[\${KEY}]=1
            writeConfigKey "addons.\"\${KEY}\"" "\${VAL}" "\${USER_CONFIG_FILE}"
          done
          if echo "${MODEL}" | grep -Eq '^(DS918\+|DS1019\+|DS1621xs\+|RS1619xs)$'; then
            FORCE_NVME_CACHE=1
            KEY="nvmecache"
            VAL=""
            writeConfigKey "addons.\"\${KEY}\"" "\${VAL}" "\${USER_CONFIG_FILE}"
          fi

          readConfigMap "addons" "\${USER_CONFIG_FILE}" || true

          set +e
          menu.sh make
          MAKE_RC=$?
          set -e
          if [ "\${MAKE_RC}" -ne 0 ]; then
            echo "[E] menu.sh make failed (rc=\${MAKE_RC})"
            [ -f "\${LOG_FILE}" ] && cat "\${LOG_FILE}" || true
            exit "\${MAKE_RC}"
          fi

          rm -rf /mnt/p3/ssh || true
          menu.sh cleanCache
          EOF

          chmod +x build.sh

          STAGE_HELPER="/tmp/2in1-helper"
          rm -rf "$STAGE_HELPER"
          mkdir -p "$STAGE_HELPER/script"
          cp -f "$AINAS2IN1_DIR/script/2in1func.sh" "$STAGE_HELPER/script/"
          cp -f "$AINAS2IN1_DIR/img/grub.img.gz" "$STAGE_HELPER/"

          RR_IMAGE_TAG="$TAG"
          if [ "$TAG" != "25.9.7" ] && [ "$(printf '%s\n' "$TAG" "25.9.7" | sort -V | head -n1)" = "$TAG" ]; then
            RR_IMAGE_TAG="26.4.0"
          fi
          echo "[DEBUG] rr docker image tag=${RR_IMAGE_TAG}"
          
          mkdir -p /tmp/docker_ainas /tmp/docker_root
          sudo cp -a /tmp/initrd_work/opt/ainas /tmp/docker_ainas/
          sudo cp -a /tmp/initrd_work/root/.bashrc /tmp/docker_root/.bashrc
          sudo chown -R "$USER":"$USER" /tmp/docker_ainas /tmp/docker_root || true
          sudo rm -rf /tmp/initrd_work

          docker run --rm --privileged \
            -v "/tmp/docker_ainas/ainas:/opt/ainas" \
            -v "/tmp/docker_root/.bashrc:/root/.bashrc" \
            -v "$PWD/build.sh:/opt/ainas/build.sh" \
            -v "$PWD:$PWD" -w /opt/ainas \
            "wjz304/rr:${RR_IMAGE_TAG}" bash /opt/ainas/build.sh
          fi

          sudo mkdir -p /mnt/p3
          sudo mount "${loopx}p3" /mnt/p3 || true

          sudo rm -rf /mnt/p3/dl /mnt/p3/auxfiles /mnt/p3/logs || true
          sudo umount /mnt/p3 || true

          sudo losetup --detach "$loopx"

          update_zip=""
          zip_name=""

          if [ "${UPDATE_ONLY}" = "true" ]; then
            bash "$AINAS2IN1_DIR/script/2in1_build_update.sh" rr/rr.img "$GITHUB_WORKSPACE"
            raw_update_zip="update_${SAFE_TAG}.zip"
            [ -f "$raw_update_zip" ] || raw_update_zip="$(ls -1 update_*.zip 2>/dev/null | head -n1 || true)"
            if [ -n "$raw_update_zip" ] && [ -f "$raw_update_zip" ]; then
              update_zip="update_${SAFE_TAG}_${UPDATE_FLAVOR}.zip"
              mv -f "$raw_update_zip" "$update_zip"
            fi
          else
            STAGE_HELPER="/tmp/2in1-helper"
            source "$STAGE_HELPER/script/2in1func.sh"

            usercfg="user-config.yml"
            localecfg=".locale"
            user_loop=$(sudo losetup -f)
            sudo losetup -P "$user_loop" rr/rr.img
            sudo mkdir -p /mnt/p1
            sudo mount "${user_loop}p1" /mnt/p1
            cp -f /mnt/p1/user-config.yml "$usercfg" 2>/dev/null || true
            cp -f /mnt/p1/.locale "$localecfg" 2>/dev/null || true
            sudo umount /mnt/p1 || true
            sudo losetup --detach "$user_loop" || true

            gzip -dc "$STAGE_HELPER/grub.img.gz" > rr/rr_2in1.img
            echo "[DEBUG] repack_2in1_Img start: rr/rr.img -> rr/rr_2in1.img"
            repack_2in1_Img rr/rr.img rr/rr_2in1.img
            echo "[DEBUG] repack_2in1_Img done: rr/rr_2in1.img"
            rm -f rr/rr.img
            mv -f rr/rr_2in1.img rr/rr.img
            
            echo "[INFO] 解析 pats.xlsx 并匹配 PAT 下载地址"
            PAT_XLSX_URL="https://github.com/RROrg/rr/raw/main/docs/pats.xlsx"
            curl -fsSL --connect-timeout 15 "$PAT_XLSX_URL" -o /tmp/pats.xlsx

            python3 -m pip -q install --user openpyxl
            PAT_LINE=$(python3 -c "import os,re,openpyxl;wb=openpyxl.load_workbook('/tmp/pats.xlsx',data_only=True);ws=wb[wb.sheetnames[0]];model=os.environ['MODEL'];line_req=os.environ.get('DSM_LINE_REQ','7.3.2');rows=[(('' if r[0] is None else str(r[0]).strip()),('' if len(r)<2 or r[1] is None else str(r[1]).strip()),('' if len(r)<3 or r[2] is None else str(r[2]).strip())) for r in ws.iter_rows(min_row=1,values_only=True)];rows=[t for t in rows if t[0] and t[1] and t[2] and not (t[0].lower()=='model' and t[1].lower().startswith('version'))];cand=[(v,u) for m,v,u in rows if m==model and v.startswith(line_req+'-')];allm=[(v,u) for m,v,u in rows if m==model];sel=cand if cand else allm;sel or (_ for _ in ()).throw(SystemExit(f'no pat found for model={model}'));best=sorted(sel,key=lambda x:[int(t) for t in re.findall(r'\\d+',x[0])],reverse=True)[0];print(best[0]+'\\t'+best[1])")
            PAT_VERSION="${PAT_LINE%%$'\t'*}"
            PAT_URL="${PAT_LINE#*$'\t'}"
            [ -n "$PAT_VERSION" ] && [ -n "$PAT_URL" ] || { echo "[E] PAT 解析失败"; exit 1; }
            if [[ "$PAT_VERSION" != "${DSM_LINE_REQ}-"* ]]; then
              echo "[E] PAT 版本不匹配: req=${DSM_LINE_REQ}, got=${PAT_VERSION}"
              exit 1
            fi
            echo "[INFO] PAT_VERSION=$PAT_VERSION"
            echo "[INFO] PAT_URL=$PAT_URL"

            ver_main="${PAT_VERSION%%-*}"
            ver_main_nodot="${ver_main//./}"
            ver_build="${PAT_VERSION#*-}"
            ver_build="${ver_build%%-*}"
            artifact_version="${ver_main_nodot}_${ver_build}"
            artifact="${MODEL}_${artifact_version}_15g_Ainas2in1_${SAFE_TAG}"
            echo "[INFO] artifact renamed to: $artifact"

            mkdir -p /tmp/dsm-install
            PAT_FILE="/tmp/dsm-install/$(basename "$PAT_URL")"
            curl -fsSL --connect-timeout 20 "$PAT_URL" -o "$PAT_FILE"
            ls -lh "$PAT_FILE"

            echo "[INFO] 使用 ainas2in1 docker-compose 启动 DSM 安装容器"
            cp -f "$AINAS2IN1_DIR/docker/docker-compose.yaml" /tmp/dsm-install/docker-compose.yaml
            sed -i "s#\./rr.img:/rr.img#${WORKDIR}/rr/rr.img:/rr.img#g" /tmp/dsm-install/docker-compose.yaml
            sed -i 's/^\([[:space:]]*container_name:[[:space:]]*\).*/\1dsm/' /tmp/dsm-install/docker-compose.yaml
            cd /tmp/dsm-install
            docker compose -f docker-compose.yaml down || true
            docker rm -f dsm >/dev/null 2>&1 || true
            docker compose -f docker-compose.yaml up -d
            
            echo "[INFO] dsm 容器已启动，实时输出启动日志（前60秒）"
            docker ps --filter "name=^dsm$" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            timeout 60 docker logs -f dsm 2>&1 || true

            HOST_PORT=5000
            if timeout 3 bash -lc '</dev/tcp/127.0.0.1/5000' 2>/dev/null; then HOST_PORT=5000; fi
            echo "[INFO] 执行自动安装监控程序"
            set +e
            MAX_MINUTES=5 TARGET_PORT=${HOST_PORT} bash "$AINAS2IN1_DIR/script/dsm_install_watch.sh" 127.0.0.1 "$PAT_FILE"
            FIRST_RC=$?
            set -e
            if [ "$FIRST_RC" -ne 0 ]; then
              if [ "$FIRST_RC" -eq 6 ]; then
                echo "[E] 检测到 error_version，直接退出"
                exit 6
              fi
              echo "[E] 首次 5 分钟内未进入安装程序（rc=${FIRST_RC}），直接退出"
              exit "$FIRST_RC"
            fi

            echo "[INFO] 安装完成后实时输出 rr 日志，并在重启1分钟后检测 web 输出（最长5分钟）"
            rm -f /tmp/dsm_boot.log
            docker logs --tail 200 dsm 2>&1 || true
            docker logs -f dsm 2>&1 | tee /tmp/dsm_boot.log &
            LOG_PID=$!

            sleep 60
            REBOOT_OK=0
            for i in $(seq 1 60); do
              OUT=$(curl -sS --max-time 3 http://127.0.0.1:5000 2>/dev/null || true)
              if [ -n "$OUT" ]; then
                echo "[INFO] 启动成功,等待安装套件..."
                WAIT_TOTAL=300; WAIT_STEP=5; elapsed=0; dots=""
                while (( elapsed < WAIT_TOTAL )); do
                  dots+="."
                  printf "\r正在安装系统套件%s (%ds/%ds)" "$dots" "$elapsed" "$WAIT_TOTAL"
                  sleep "$WAIT_STEP"
                  elapsed=$(( elapsed + WAIT_STEP ))
                done
                printf "\r正在安装系统套件%s 完成\n" "$dots"
                REBOOT_OK=1
                break
              fi
              sleep 10
            done

            kill "$LOG_PID" >/dev/null 2>&1 || true
            wait "$LOG_PID" >/dev/null 2>&1 || true

            if [ "$REBOOT_OK" != "1" ]; then
              echo "[E] 5分钟内工作流主机 curl http://127.0.0.1:5000 无输出，判定启动失败"
              exit 1
            fi

            echo "[INFO] 已确认启动成功,开始停止并删除容器"
            cd /tmp/dsm-install
            docker compose -f docker-compose.yaml down -v || true

            cd "$WORKDIR"

            echo "[INFO] 开始改名并导出镜像（img.gz）"
            mv -f rr/rr.img "${artifact}.img"
            echo "[DEBUG] gzip -1 start: ${artifact}.img -> ${artifact}.img.gz"
            gzip -1 -c "${artifact}.img" > "${artifact}.img.gz"
            echo "[DEBUG] gzip -1 done: ${artifact}.img.gz"
            zip_name="${artifact}.img.gz"
          fi
          rm -f rr/rr.base.img

          rm -rf "$AINAS2IN1_DIR" "${STAGE_HELPER:-}"

          echo "ARTIFACT=${artifact}" >> "$GITHUB_ENV"
          echo "ARTIFACT_ZIP=$zip_name" >> "$GITHUB_ENV"
          echo "UPDATE_ZIP=$update_zip" >> "$GITHUB_ENV"

      - name: Publish zip to ainas2in1 release
        shell: bash
        env:
          ACTION_TOKEN: ${{ secrets.ACTION_TOKEN }}
        run: |
          set -euo pipefail
          : "${TAG:?missing TAG}"
          : "${ACTION_TOKEN:?missing ACTION_TOKEN}"

          export GH_TOKEN="$ACTION_TOKEN"
          export GH_REPO="myp015/ainas2in1"
          release_tag="AiNas2in1_${TAG}"

          assets=()
          if [ -n "${ARTIFACT_ZIP:-}" ] && [ -f "$GITHUB_WORKSPACE/$ARTIFACT_ZIP" ]; then
            ART_PATH="$GITHUB_WORKSPACE/$ARTIFACT_ZIP"
            ART_SIZE=$(stat -c%s "$ART_PATH")
            MAX_ASSET=2147483648
            if [ "$ART_SIZE" -ge "$MAX_ASSET" ]; then
              echo "[WARN] artifact too large (${ART_SIZE} bytes), split into <=1.9GB parts"
              rm -f "${ART_PATH}.part."* || true
              split -b 1900m -d -a 3 "$ART_PATH" "${ART_PATH}.part."
              ls -lh "${ART_PATH}.part."*
              for part in "${ART_PATH}.part."*; do
                assets+=("$part")
              done
            else
              assets+=("$ART_PATH")
            fi
          fi
          if [ -n "${UPDATE_ZIP:-}" ] && [ -f "$GITHUB_WORKSPACE/$UPDATE_ZIP" ]; then
            assets+=("$GITHUB_WORKSPACE/$UPDATE_ZIP")
          fi
          if [ ${#assets[@]} -eq 0 ]; then
            echo "[E] no release assets to upload"
            exit 1
          fi

          ensure_release() {
            if gh release view "$release_tag" >/dev/null 2>&1; then
              return 0
            fi
            echo "[INFO] release $release_tag not found, creating..."
            set +e
            create_out=$(gh release create "$release_tag" \
              --title "$release_tag" \
              --notes "RR build artifacts for ${TAG}" \
              --latest=false 2>&1)
            create_rc=$?
            set -e
            if [ "$create_rc" -eq 0 ]; then
              return 0
            fi
            echo "$create_out"
            if echo "$create_out" | grep -qiE 'already exists|already_exists|Validation Failed'; then
              echo "[WARN] release was created by another matrix job, continue"
              gh release view "$release_tag" >/dev/null
              return 0
            fi
            return "$create_rc"
          }

          upload_assets() {
            local attempt
            for attempt in 1 2 3 4 5; do
              ensure_release
              echo "[INFO] upload assets attempt ${attempt}: ${assets[*]}"
              set +e
              upload_out=$(gh release upload "$release_tag" "${assets[@]}" --clobber 2>&1)
              upload_rc=$?
              set -e
              if [ "$upload_rc" -eq 0 ]; then
                return 0
              fi
              echo "$upload_out"
              if echo "$upload_out" | grep -qiE 'HTTP 404|HTTP 502|HTTP 503|HTTP 504|rate limit|secondary rate'; then
                echo "[WARN] transient upload failure, retry after ${attempt}0s"
                sleep "${attempt}0"
                continue
              fi
              return "$upload_rc"
            done
            return 1
          }

          upload_assets
