name: RR Build
on:
  workflow_dispatch:
    inputs:
      all_models:
        description: "编译模式"
        type: choice
        options:
          - 自选
          - 全选
        default: 全选
      model_ds918p:
        description: "DS918+"
        type: boolean
        default: false
      model_ds920p:
        description: "DS920+"
        type: boolean
        default: false
      model_ds923p:
        description: "DS923+"
        type: boolean
        default: false
      model_ds925p:
        description: "DS925+"
        type: boolean
        default: false
      model_ds3622xsp:
        description: "DS3622xs+"
        type: boolean
        default: false
      model_sa6400:
        description: "SA6400"
        type: boolean
        default: false
      model_ds425p:
        description: "DS425+"
        type: boolean
        default: false
      model_dva3221:
        description: "DVA3221"
        type: boolean
        default: false
      model_dva1622:
        description: "DVA1622"
        type: boolean
        default: false
      custom_models:
        description: "自定义型号(工作流未列出的,多个用逗号分隔,如 DS1621+,RS4021xs+)"
        type: string
        default: ""      
      image_size:
        description: "Image size"
        type: choice
        options:
          - 2GB
          - 2.5GB
          - 4GB
        default: 2.5GB
      rr_version:
        description: "RR version (可选,留空=latest;示例:26.4.0 或 v26.4.0)"
        type: string
        default: ""
      dsm_version:
        description: "DSM 版本编号（从 pats.xlsx 获取，选择 >= 7.2.1 的所有版本）"
        type: choice
        options:
          - "7.2.1"
          - "7.2.2"
          - "7.3.0"
          - "7.3.1"
          - "7.3.2"
          - "7.4.0"
        default: "7.2.1"

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      rr_tag: ${{ steps.pick.outputs.rr_tag }}
      rr_asset_url: ${{ steps.pick.outputs.rr_asset_url }}
    steps:
      - id: pick
        shell: bash
        run: |
          set -euo pipefail
          REQ_RAW="${{ inputs.rr_version }}"
          REQ_TAG="$(printf '%s' "$REQ_RAW" | tr -d '[:space:]')"
          REQ_TAG="${REQ_TAG#rr-}"
          REQ_TAG="${REQ_TAG%.img.zip}"
          REQ_TAG="${REQ_TAG#v}"

          fetch_latest() {
            curl -fsSL --connect-timeout 10 "https://api.github.com/repos/RROrg/rr/releases/latest"
          }
          fetch_tag() {
            local t="$1"
            curl -fsSL --connect-timeout 10 "https://api.github.com/repos/RROrg/rr/releases/tags/${t}"
          }

          if [ -z "$REQ_TAG" ] || [ "$REQ_TAG" = "latest" ]; then
            echo "[INFO] 未填写 rr_version，自动使用 latest"
            RELEASE_JSON="$(fetch_latest)"
          else
            if ! RELEASE_JSON="$(fetch_tag "$REQ_TAG" 2>/dev/null)"; then
              echo "[INFO] 指定版本 rr_version=${REQ_RAW} 未找到，回退到最新版本"
              RELEASE_JSON="$(fetch_latest)"
            fi
          fi

          RR_TAG="$(printf '%s' "$RELEASE_JSON" | jq -r '.tag_name' | sed 's/^v//')"
          RR_ASSET_URL="$(printf '%s' "$RELEASE_JSON" | jq -r '.assets[]? | select(.name | test("^rr-.*[.]img[.]zip$")) | .browser_download_url' | head -n1)"
          if [ -z "$RR_TAG" ] || [ "$RR_TAG" = "null" ] || [ -z "$RR_ASSET_URL" ] || [ "$RR_ASSET_URL" = "null" ]; then
            echo "[E] 下载失败：无法解析 RR 发布信息 (rr_version=${REQ_RAW:-latest})"
            exit 1
          fi

          echo "[INFO] 已解析 RR 版本：${RR_TAG}"
          echo "rr_tag=$RR_TAG" >> "$GITHUB_OUTPUT"
          echo "rr_asset_url=$RR_ASSET_URL" >> "$GITHUB_OUTPUT"

  select-models:
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.pick.outputs.models }}
    steps:
      - id: pick
        shell: bash
        run: |
          set -euo pipefail
          MODELS=()

          if [ "${{ inputs.all_models }}" = "全选" ]; then
            echo "[INFO] 已开启全选，将编译所有支持的型号"
            MODELS+=("DS918+" "DS920+" "DS923+" "DS925+" "DS3622xs+" "SA6400" "DS425+" "DVA3221" "DVA1622")
          else
            [ "${{ inputs.model_ds918p }}"    = "true" ] && MODELS+=("DS918+")
            [ "${{ inputs.model_ds920p }}"    = "true" ] && MODELS+=("DS920+")
            [ "${{ inputs.model_ds923p }}"    = "true" ] && MODELS+=("DS923+")
            [ "${{ inputs.model_ds925p }}"    = "true" ] && MODELS+=("DS925+")
            [ "${{ inputs.model_ds3622xsp }}" = "true" ] && MODELS+=("DS3622xs+")
            [ "${{ inputs.model_sa6400 }}"    = "true" ] && MODELS+=("SA6400")
            [ "${{ inputs.model_ds425p }}"    = "true" ] && MODELS+=("DS425+")
            [ "${{ inputs.model_dva3221 }}"   = "true" ] && MODELS+=("DVA3221")
            [ "${{ inputs.model_dva1622 }}"   = "true" ] && MODELS+=("DVA1622")
          fi
          
          # 追加自定义型号（工作流未列出的型号）
          CUSTOM_RAW="${{ inputs.custom_models }}"
          if [ -n "$(printf '%s' "$CUSTOM_RAW" | tr -d '[:space:]')" ]; then
            echo "[INFO] 检测到自定义型号输入: ${CUSTOM_RAW}"
            IFS=',' read -ra CUSTOM_ARR <<< "$CUSTOM_RAW"
            for cm in "${CUSTOM_ARR[@]}"; do
              cm="$(echo "$cm" | xargs)"
              [ -n "$cm" ] && MODELS+=("$cm")
            done
          fi
          
          
          # 去重
          UNIQ_MODELS=()
          for MODEL_ITEM in "${MODELS[@]}"; do
            SKIP=0
            for SEEN_ITEM in "${UNIQ_MODELS[@]}"; do
              [ "$SEEN_ITEM" = "$MODEL_ITEM" ] && { SKIP=1; break; }
            done
            [ $SKIP -eq 0 ] && UNIQ_MODELS+=("$MODEL_ITEM")
          done
          MODELS=("${UNIQ_MODELS[@]}")

          if [ ${#MODELS[@]} -eq 0 ]; then
            echo "[E] 请至少勾选一个型号"
            exit 1
          fi

          echo "[INFO] 已选择型号: ${MODELS[*]}"
          MODELS_JSON=$(printf "%s\n" "${MODELS[@]}" | python3 -c "import sys,json; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))")
          echo "models=$MODELS_JSON" >> "$GITHUB_OUTPUT"
  build:
    name: ${{ format('build ({0})', matrix.model) }}
    needs: [resolve-release, select-models]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # max-parallel: 3
      matrix:
        model: ${{ fromJson(needs.select-models.outputs.models) }}
    env:
      IMAGE_FORMAT: img
      IMAGE_SIZE: ${{ inputs.image_size }}
      BUILD_LANGUAGE: zh_CN
      BUILD_KERNEL: official
      BUILD_ADDONS: acpid,reboottoloader,addincards,cpuinfo,expands,diskcompat,lsiutil,nvmevolume,powersched,remotefs,storagepanel,smartctl,trivial,apppatch,vmtools
      ACTION_TOKEN: ${{ secrets.ACTION_TOKEN }}
      RR_ASSET_URL: ${{ needs.resolve-release.outputs.rr_asset_url }}
      RR_TAG: ${{ needs.resolve-release.outputs.rr_tag }}
      MODEL: ${{ matrix.model }}
      DSM_LINE: ${{ inputs.dsm_version }}
    steps:
      - name: Checkout main repo
        uses: actions/checkout@main

      - name: 初始化环境
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Checkout ainas2in1
        uses: actions/checkout@v4
        with:
          repository: myp015/ainas2in1
          token: ${{ secrets.ACTION_TOKEN }}
          path: .2in1

      - name: 下载 RR 镜像资源
        shell: bash
        run: |
          set -euo pipefail
          : "${RR_TAG:?缺少 RR_TAG}"
          : "${RR_ASSET_URL:?缺少 RR_ASSET_URL}"
          RR_FILENAME="rr-${RR_TAG}.img.zip"
          echo "[INFO] 正在下载 RR 镜像资源：${RR_FILENAME}"
          curl -fsSL --connect-timeout 10 "$RR_ASSET_URL" -o "$RR_FILENAME"
          echo "RR_TAG=$RR_TAG" >> "$GITHUB_ENV"
          echo "RR_FILENAME=$RR_FILENAME" >> "$GITHUB_ENV"

      - name: 编译镜像
        shell: bash
        run: |
          set -euo pipefail

          # ── 目录与常量 ────────────────────────────────────────────
          WORKDIR="$PWD"
          AINAS2IN1_DIR="${WORKDIR}/.2in1"
          GRUB_MNT="/mnt/p1"
          SYSTEM_MNT="/mnt/p3"

          # ── DSM 版本映射（版本编号来自 pats.xlsx，仅 >= 7.2.1）──────
          pick_target_dsm_version() {
            local line="$1"
            case "$line" in
              7.2.1) printf '7.2.1-69057-1'   ;;
              7.2.2) printf '7.2.2-72806-0'   ;;
              7.3.0) printf '7.3.0-81180-0'   ;;
              7.3.1) printf '7.3.1-86003-0'   ;;
              7.3.2) printf '7.3.2-86009-0'   ;;
              7.4.0)
                python3 -m pip -q install --user openpyxl
                DSM_VERSION_74=$(MODEL="${MODEL}" python3 -c "import os,re,urllib.request,openpyxl;url='https://raw.githubusercontent.com/RROrg/rr/main/docs/pats.xlsx';path='/tmp/pats.xlsx';urllib.request.urlretrieve(url,path);wb=openpyxl.load_workbook(path,data_only=True);ws=wb[wb.sheetnames[0]];model=os.environ['MODEL'];line_req='7.4.0';rows=[(('' if r[0] is None else str(r[0]).strip()),('' if len(r)<2 or r[1] is None else str(r[1]).strip()),('' if len(r)<3 or r[2] is None else str(r[2]).strip())) for r in ws.iter_rows(min_row=1,values_only=True)];rows=[t for t in rows if t[0] and t[1] and t[2] and not (t[0].lower()=='model' and t[1].lower().startswith('version'))];cand=[(v,u) for m,v,u in rows if m==model and v.startswith(line_req+'-')];allm=[(v,u) for m,v,u in rows if m==model];sel=cand if cand else allm;sel or (_ for _ in ()).throw(SystemExit(f'no pat found for model={model}'));best=sorted(sel,key=lambda x:[int(t) for t in re.findall(r'\d+',x[0])],reverse=True)[0];print(best[0])")
                printf '%s' "$DSM_VERSION_74"
                ;;
              *)
                echo "[E] 不支持的 DSM 版本: $line" >&2
                return 1
                ;;
            esac
          }

          DSM_LINE_REQ="${DSM_LINE:-7.2.1}"
          if echo "${MODEL}" | grep -Eq '^(DS925\+|DS425\+)$' && [ "${DSM_LINE_REQ}" = "7.2.1" ]; then
            echo "[INFO] ${MODEL} 不支持 DSM 7.2.1，自动切换到 7.2.2"
            DSM_LINE_REQ="7.2.2"
          fi

          DSM_VERSION="$(pick_target_dsm_version "${DSM_LINE_REQ}")"
          DSM_VERSION_MAIN="${DSM_VERSION%%-*}"
          DSM_VERSION_BUILD="${DSM_VERSION#*-}"
          DSM_VERSION_BUILD="${DSM_VERSION_BUILD%%-*}"
          DSM_VERSION_SLUG="${DSM_VERSION_MAIN//./}_${DSM_VERSION_BUILD}"
          ARTIFACT_NAME="${MODEL}_${DSM_VERSION_SLUG}_rr"
          echo "[INFO] 型号=${MODEL} 目标DSM版本=${DSM_VERSION} DSM系列=${DSM_LINE_REQ} 版本slug=${DSM_VERSION_SLUG}"

          # ── 系统依赖 ──────────────────────────────────────────────
          echo "[INFO] 正在安装构建依赖"
          sudo apt-get update
          sudo apt-get install -y gettext cpio zstd dosfstools rsync qemu-utils
          unzip "$RR_FILENAME" -d rr rr.img
          cp -f rr/rr.img rr/rr.base.img

          # ── GRUB 修补 ─────────────────────────────────────────────
          GRUB_LOOP=$(sudo losetup -f)
          sudo mkdir -p /mnt/p1 /mnt/p2 /mnt/p3
          sudo losetup -P "$GRUB_LOOP" rr/rr.img

          sudo mount -o rw "${GRUB_LOOP}p1" "$GRUB_MNT"
          echo "[INFO] 开始修补 grub.cfg"
          sudo env MODEL_ENV="$MODEL" python3 "$AINAS2IN1_DIR/script/patch-grub-cfg.py" "$GRUB_MNT/boot/grub/grub.cfg"
          echo "[INFO] grub.cfg 修补成功"
          sudo umount "$GRUB_MNT" || true
          sudo losetup --detach "$GRUB_LOOP" || true

          # ── 挂载 p3 分区 ──────────────────────────────────────────
          DISK_LOOP=$(sudo losetup -f)
          sudo losetup -P "$DISK_LOOP" rr/rr.img
          sudo rm -rf "$SYSTEM_MNT"
          sudo mkdir -p "$SYSTEM_MNT"
          sudo mount "${DISK_LOOP}p3" "$SYSTEM_MNT"

          # ── cpuinfo 修补 ──────────────────────────────────────────
          echo "[INFO] 开始修补 cpuinfo"
          CPUINFO_TGZ="$SYSTEM_MNT/addons/cpuinfo/all.tgz"
          CPUINFO_WORK="/tmp/cpuinfo_patch"
          if [ -f "$CPUINFO_TGZ" ]; then
            rm -rf "$CPUINFO_WORK"
            mkdir -p "$CPUINFO_WORK/extract" "$CPUINFO_WORK/rootfs"
            sudo tar -zxf "$CPUINFO_TGZ" -C "$CPUINFO_WORK/extract"

            CPUINFO_PATCH_TARGET=""
            CPUINFO_REPACK_MODE=""
            if [ -f "$CPUINFO_WORK/extract/all.tar" ]; then
              CPUINFO_REPACK_MODE="inner-tar"
              sudo tar -xf "$CPUINFO_WORK/extract/all.tar" -C "$CPUINFO_WORK/rootfs"
              [ -f "$CPUINFO_WORK/rootfs/root/usr/bin/cpuinfo.sh" ] && \
                CPUINFO_PATCH_TARGET="$CPUINFO_WORK/rootfs/root/usr/bin/cpuinfo.sh"
            elif [ -f "$CPUINFO_WORK/extract/root/usr/bin/cpuinfo.sh" ]; then
              CPUINFO_REPACK_MODE="direct"
              CPUINFO_PATCH_TARGET="$CPUINFO_WORK/extract/root/usr/bin/cpuinfo.sh"
            fi

            if [ -n "$CPUINFO_PATCH_TARGET" ]; then
              python3 "$AINAS2IN1_DIR/script/patch-cpuinfo.py" "$CPUINFO_PATCH_TARGET"
              if [ "$CPUINFO_REPACK_MODE" = "inner-tar" ]; then
                (cd "$CPUINFO_WORK/rootfs"  && sudo tar -cf "$CPUINFO_WORK/extract/all.tar" .)
                (cd "$CPUINFO_WORK/extract" && sudo tar -czf "$CPUINFO_TGZ" .)
              else
                (cd "$CPUINFO_WORK/extract" && sudo tar -czf "$CPUINFO_TGZ" .)
              fi
              echo "[INFO] cpuinfo all.tgz 重新打包成功 (模式=$CPUINFO_REPACK_MODE)"
            else
              echo "[INFO] cpuinfo.sh 未在已知 all.tgz 结构中找到，跳过 cpuinfo 修补"
            fi
          else
            echo "[INFO] $CPUINFO_TGZ 不存在，跳过 cpuinfo 修补"
          fi

          # ── initrd 修补与重打包（改用 2in1func.sh 的解包/重打包函数）──
          . "$AINAS2IN1_DIR/script/2in1func.sh"

          INITRD_SRC="$SYSTEM_MNT/initrd-rr"
          INITRD_WORK="/tmp/initrd_work"
          INITRD_NEW="/tmp/initrd-rr.new"

          echo "[INFO] 使用 unpackInitrd 解包 initrd-rr"
          sudo rm -rf "$INITRD_WORK" "$INITRD_NEW"
          sudo mkdir -p "$INITRD_WORK"
          unpackInitrd "$INITRD_SRC" "$INITRD_WORK"

          cd "$INITRD_WORK"
          sudo bash "$AINAS2IN1_DIR/script/replace_ainas_po_notice.sh"
          sudo AINAS2IN1_DIR="$AINAS2IN1_DIR" bash -c 'set -euo pipefail; . "${AINAS2IN1_DIR}/script/2in1func.sh"; convertpo2mo opt/rr/lang'
          cd "$WORKDIR"

          echo "[INFO] 使用 repackInitrd 重新打包 initrd-rr"
          repackInitrd "$INITRD_SRC" "$INITRD_WORK" "$INITRD_NEW"
          sudo cp -f "$INITRD_NEW" "$INITRD_SRC"
          sudo sync
          sudo rm -rf "$INITRD_WORK" "$INITRD_NEW"


          sudo umount "$SYSTEM_MNT" || true
          sudo rm -rf "$SYSTEM_MNT"
          

          # ── 使用 RR Docker 编译镜像 ───────────────────────────────
          cat > build.sh <<'EOF'
          set -eo pipefail
          . menu.sh
          echo "[INFO] 型号=${MODEL} 目标DSM版本=${DSM_VERSION}"
          menu.sh modelMenu "${MODEL}"

          # ── 联网获取 pat + 编译，带重试 ──────────────────────────
          MAX_RETRY="${MAX_RETRY:-5}"
          RETRY_SLEEP="${RETRY_SLEEP:-20}"

          fetch_and_build() {
            # 重新选择版本（此步会联网拉取 pat）
            menu.sh productversMenu "${DSM_VERSION}"

            # 校验 pat url 是否为空：为空说明联网失败，返回特定码 7
            PAT_URL="$(readConfigKey "paturl" "${USER_CONFIG_FILE}" 2>/dev/null || echo '')"
            if [ -z "${PAT_URL}" ] || [ "${PAT_URL}" = "null" ]; then
              echo "[WARN] pat url 为空，判定为联网失败"
              return 7
            fi
            echo "[INFO] 已获取 pat url: ${PAT_URL}"

            LOCALE_FILE="$(dirname "${USER_CONFIG_FILE}")/.locale"
            echo "${BUILD_LANGUAGE}.UTF-8" >"${LOCALE_FILE}"

            writeConfigKey "addons" "{}" "${USER_CONFIG_FILE}"
            ADDONS_SEED="${BUILD_ADDONS}"
            IFS=',' read -ra ADDON_ARR <<< "${ADDONS_SEED}"
            declare -A __SEEN_ADDON=()
            for A in "${ADDON_ARR[@]}"; do
              ADDON_KEY="$(echo "${A}" | cut -d':' -f1 | xargs)"
              [ -z "${ADDON_KEY}" ] && continue
              [ -n "${__SEEN_ADDON[${ADDON_KEY}]}" ] && continue
              __SEEN_ADDON[${ADDON_KEY}]=1
              writeConfigKey "addons.${ADDON_KEY}" "" "${USER_CONFIG_FILE}"
            done

            menu.sh make
          }

          RC=0
          for i in $(seq 1 "${MAX_RETRY}"); do
            echo "[INFO] 第 ${i}/${MAX_RETRY} 次尝试编译"
            if fetch_and_build; then
              RC=0; break
            else
              RC=$?
              echo "[WARN] 第 ${i} 次编译失败 (rc=${RC})"
              # 只对联网类错误(7)重试，其它错误直接退出
              if [ "${RC}" != "7" ]; then
                echo "[E] 非联网错误，停止重试"; break
              fi
              menu.sh cleanCache || true
              [ "${i}" -lt "${MAX_RETRY}" ] && { echo "[INFO] ${RETRY_SLEEP}s 后重试"; sleep "${RETRY_SLEEP}"; }
            fi
          done

          if [ "${RC}" != "0" ]; then
            echo "[E] 达到最大重试次数仍失败，rc=${RC}"; exit "${RC}"
          fi

          rm -rf /mnt/p3/ssh || true
          menu.sh cleanCache
          EOF
          
          chmod +x build.sh

          RR_IMAGE_TAG="$RR_TAG"
          if [ "$RR_TAG" != "25.9.7" ] && [ "$(printf '%s' "$RR_TAG" "25.9.7" | sort -V | head -n1)" = "$RR_TAG" ]; then
            RR_IMAGE_TAG="25.9.7"
          fi
          echo "[INFO] RR Docker 镜像标签=${RR_IMAGE_TAG}"
          docker pull "wjz304/rr:${RR_IMAGE_TAG}"
          docker run --rm --privileged \
            -e MODEL="${MODEL}" \
            -e DSM_VERSION="${DSM_VERSION}" \
            -e BUILD_LANGUAGE="${BUILD_LANGUAGE}" \
            -e BUILD_ADDONS="${BUILD_ADDONS}" \
            -v "$PWD/build.sh:/opt/rr/build.sh" \
            -v "$PWD:$PWD" -w "$PWD" \
            "wjz304/rr:${RR_IMAGE_TAG}" bash /opt/rr/build.sh

          # ── 清理 p3 临时文件 ──────────────────────────────────────
          sudo mkdir -p "$SYSTEM_MNT"
          sudo mount "${DISK_LOOP}p3" "$SYSTEM_MNT" || true
          sudo rm -rf "$SYSTEM_MNT/dl" "$SYSTEM_MNT/auxfiles" "$SYSTEM_MNT/logs" || true
          sudo umount "$SYSTEM_MNT" || true
          sudo losetup --detach "$DISK_LOOP"

          # ── 提取 user-config.yml ──────────────────────────────────
          . "$AINAS2IN1_DIR/script/2in1func.sh"
          USER_CONFIG_YML="user-config.yml"
          USER_LOOP=$(sudo losetup -f)
          sudo losetup -P "$USER_LOOP" rr/rr.img
          sudo mkdir -p /mnt/p1
          sudo mount "${USER_LOOP}p1" /mnt/p1
          cp -f /mnt/p1/user-config.yml "$USER_CONFIG_YML" 2>/dev/null || true
          sudo umount /mnt/p1 || true
          sudo losetup --detach "$USER_LOOP" || true

          # ── 选择引导镜像 ──────────────────────────────────────────
          if [ "$(printf '%s\n' "${RR_TAG}" "26.2.2" | sort -V | head -n1)" = "26.2.2" ]; then
            GRUB_IMG="ainas/grub2.14.img.gz"
          else
            GRUB_IMG="ainas/grub2.12.img.gz"
          fi
          echo "[INFO] rr tag=${RR_TAG} 选用的引导镜像=${GRUB_IMG}"

          # ── 按目标大小 Repack 镜像 ────────────────────────────────
          case "$IMAGE_SIZE" in
            2GB)
              gzip -dc "$GRUB_IMG" > rr/rr_2GB.img
              repack_rr_Img rr/rr.img rr/rr_2GB.img
              rm -f rr/rr.img
              mv -f rr/rr_2GB.img rr/rr.img
              ;;
            2.5GB)
              gzip -dc "$GRUB_IMG" > rr/rr_2GB.img
              repack_rr_Img rr/rr.img rr/rr_2GB.img
              resizeImg rr/rr_2GB.img +512M
              rm -f rr/rr.img
              mv -f rr/rr_2GB.img rr/rr.img
              ;;
            4GB)
              echo "[INFO] 保持默认 4GB 镜像"
              ;;
            *)
              echo "[E] 不支持的镜像大小: $IMAGE_SIZE"
              exit 1
              ;;
          esac
          echo "[INFO] 最终镜像大小(字节): $(stat -c%s rr/rr.img)"

          # ── 导出并打包制品 ────────────────────────────────────────
          case "$IMAGE_FORMAT" in
            img)
              mv -f rr/rr.img "${ARTIFACT_NAME}.img"
              [ "$USER_CONFIG_YML" = "user-config.yml" ] || mv -f "$USER_CONFIG_YML" "user-config.yml"
              ;;
            *)
              echo "[E] 不支持的镜像格式: $IMAGE_FORMAT"
              exit 1
              ;;
          esac

          rm -f rr/rr.img rr/rr.base.img

          ARTIFACT_ZIP="${ARTIFACT_NAME}.zip"
          zip -qr "$ARTIFACT_ZIP" "${ARTIFACT_NAME}.img" user-config.yml
          if [ -d "ainas" ]; then
            find ainas -maxdepth 1 -type f -name '*.exe' -exec zip -qj "$ARTIFACT_ZIP" {} +
          fi

          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"
          echo "ARTIFACT_ZIP=$ARTIFACT_ZIP" >> "$GITHUB_ENV"

      - name: 发布制品到 ainas2in1 Release
        shell: bash
        env:
          ACTION_TOKEN: ${{ secrets.ACTION_TOKEN }}
        run: |
          set -euo pipefail
          : "${RR_TAG:?缺少 RR_TAG}"
          : "${ARTIFACT_ZIP:?缺少 ARTIFACT_ZIP}"
          : "${ACTION_TOKEN:?缺少 ACTION_TOKEN}"

          export GH_TOKEN="$ACTION_TOKEN"
          export GH_REPO="myp015/ainas2in1"
          RELEASE_TAG="rr-${RR_TAG}"

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "[INFO] 发布标签 ${RELEASE_TAG} 不存在，正在创建"
            gh release create "$RELEASE_TAG" \
              "$GITHUB_WORKSPACE/$ARTIFACT_ZIP" \
              --title "$RELEASE_TAG" \
              --notes "RR build artifacts for ${RR_TAG}" \
              --latest=false
            exit 0
          fi

          echo "[INFO] 正在向已有发布 ${RELEASE_TAG} 上传制品"
          gh release upload "$RELEASE_TAG" "$GITHUB_WORKSPACE/$ARTIFACT_ZIP" --clobber
